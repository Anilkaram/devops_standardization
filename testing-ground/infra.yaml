project:
  name: doc-api-platform
  region: us-east-1
  owner: platform-team
  type: document-processing-api

stage: production

team:
  size: medium
  ops_maturity: high

runtime:
  language: python
  containerised: true

# ── Services ─────────────────────────────────────────────────────────────────
# Catalog names only — 'vpc' and 'direct-connect' are NOT services:
#   vpc             → auto-generated by scaffold (networking.tf)
#   direct-connect  → physical/network-layer; provision via AWS console or account team
#   virtual-priv-gw → part of Direct Connect attachment; attach manually post-scaffold
services:
  # Compute (private subnet)
  - ec2                 # App & API host — receives requests from virtual private gateway
  - ecs-fargate         # Doc API service — POST /process-document handler

  # AI / ML (VPC endpoints)
  - bedrock             # Embedding model (titan-embed) + document parsing

  # Data (VPC endpoints)
  - postgres            # Amazon RDS PostgreSQL — document metadata store
  - s3                  # Amazon S3 — document binary storage
  - opensearch          # Amazon OpenSearch — vector search index

  # Security
  - kms                 # CMK encrypts RDS, S3, OpenSearch at rest
  - secrets-manager     # DB credentials + Bedrock API config

  # Observability
  - cloudwatch          # CloudWatch + CloudWatch Logs — metrics and logs
  - xray                # AWS X-Ray — distributed tracing across EC2 and ECS

# ── Auth ─────────────────────────────────────────────────────────────────────
auth:
  required: true
  method: iam           # IAM roles for EC2 instance profile and ECS task role

# ── Connections ──────────────────────────────────────────────────────────────
connections:
  # Request path: Direct Connect → VPG → EC2 → ECS Doc API
  - { from: ec2,          to: ecs-fargate     }  # EC2 app calls Doc API

  # ECS Doc API → data & AI tier
  - { from: ecs-fargate,  to: postgres        }  # Read/write document metadata
  - { from: ecs-fargate,  to: s3              }  # Store and retrieve document files
  - { from: ecs-fargate,  to: bedrock         }  # Document parsing + embedding model calls
  - { from: ecs-fargate,  to: opensearch      }  # Index and query vectors

  # Secrets access
  - { from: ec2,          to: secrets-manager }  # Fetch DB credentials
  - { from: ecs-fargate,  to: secrets-manager }  # Fetch DB credentials + Bedrock config

  # Encryption
  - { from: kms,          to: postgres        }  # Encrypt RDS storage at rest
  - { from: kms,          to: s3              }  # SSE-KMS for S3 document storage
  - { from: kms,          to: opensearch      }  # Encrypt OpenSearch domain
  - { from: kms,          to: secrets-manager }  # Envelope-encrypt secrets

  # Observability
  - { from: ec2,          to: cloudwatch      }  # App & API host logs + metrics
  - { from: ecs-fargate,  to: cloudwatch      }  # Container logs + metrics
  - { from: ec2,          to: xray            }  # Distributed traces from EC2
  - { from: ecs-fargate,  to: xray            }  # Distributed traces from ECS

# ── Flows ────────────────────────────────────────────────────────────────────
flows:
  document_processing_flow:
    description: "UL client sends POST /process-document over AWS Direct Connect (private encrypted link) to the Virtual Private Gateway. The request routes to EC2 (App & API host) in the private subnet, which calls the ECS Doc API. The Doc API stores the document in S3, writes metadata to RDS PostgreSQL, calls Amazon Bedrock for document parsing and embedding generation, then indexes the embedding vector in OpenSearch."
    services: [ec2, ecs-fargate, s3, postgres, bedrock, opensearch]

  observability_flow:
    description: "EC2 and ECS containers emit application logs and metrics to CloudWatch Logs and CloudWatch Metrics. AWS X-Ray captures distributed traces across EC2 and ECS for end-to-end latency analysis of the /process-document path."
    services: [ec2, ecs-fargate, cloudwatch, xray]

# ── Environments ─────────────────────────────────────────────────────────────
environments:
  dev:
    multi_az: false
    ecs-fargate:
      cpu: 512
      memory: 1024
    postgres:
      instance_class: db.t3.medium
      multi_az: false

  prod:
    multi_az: true
    ecs-fargate:
      cpu: 1024
      memory: 2048
    postgres:
      instance_class: db.r5.large
      multi_az: true

# ── CI/CD ────────────────────────────────────────────────────────────────────
cicd:
  auto_deploy:
    - dev
  manual_deploy:
    - prod

# ── Manual post-scaffold additions ───────────────────────────────────────────
# AWS Direct Connect connection  — provisioned by AWS account team / console
# Virtual Private Gateway        — attach to VPC after Direct Connect is provisioned
# OpenSearch VPC endpoint        — configure after opensearch domain is created
# Bedrock VPC endpoint           — com.amazonaws.us-east-1.bedrock-runtime
