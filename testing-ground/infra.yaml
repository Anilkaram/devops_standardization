project:
  name: eks-cicd-platform
  region: us-west-2
  owner: devops-team
  type: container-platform

stage: production

team:
  size: medium
  ops_maturity: high

runtime:
  language: python
  containerised: true

# ── Services ─────────────────────────────────────────────────────────────────
# Mapped to actual AWS/catalog service names from the architecture diagram.
# kubernetes-api, kubernetes-deployment, worker-nodes, pods are EKS internals
# — they are configured via eks node groups and deployment settings below.
services:
  # Container registry — image source
  - ecr

  # Event-driven deployment trigger
  - eventbridge           # ECR image push → EventBridge rule → Lambda
  - sqs                   # Parallel event queue for monitoring/logging

  # Deployment automation
  - lambda                # Deployment Function: updates Kubernetes deployment

  # Kubernetes platform (EKS manages API server, worker nodes, pods internally)
  - eks

  # Notifications & observability
  - sns                   # Event Notification (EventBridge/Lambda → SNS → subscribers)
  - cloudwatch            # Monitoring: Lambda errors, deployment failures, pod alarms

  # Security
  - kms                   # Encrypts ECR images, CloudWatch logs, SQS messages
  - secrets-manager       # Stores kubeconfig credentials for Lambda → EKS auth

# ── Auth ─────────────────────────────────────────────────────────────────────
auth:
  required: true
  method: iam             # IAM roles: Lambda execution role + EKS node role

# ── Connections (matches arrows in the diagram) ───────────────────────────────
connections:
  # Image push → deployment trigger
  - { from: ecr,          to: eventbridge }   # ECR push event → EventBridge rule
  - { from: eventbridge,  to: lambda      }   # EventBridge → Lambda Deployment Function
  - { from: eventbridge,  to: sqs         }   # EventBridge → SQS (parallel audit queue)

  # Lambda → EKS (Kubernetes API server → rolling update → pods)
  - { from: lambda,       to: eks         }   # Lambda calls EKS Kubernetes API
  - { from: eks,          to: ecr         }   # EKS pulls container image from ECR

  # Notifications
  - { from: lambda,       to: sns         }   # Lambda publishes deployment events to SNS
  - { from: sqs,          to: sns         }   # SQS consumer publishes to SNS

  # Observability
  - { from: lambda,       to: cloudwatch  }   # Lambda logs + alarms
  - { from: eks,          to: cloudwatch  }   # EKS Container Insights metrics

  # Security
  - { from: kms,          to: secrets-manager } # KMS encrypts secrets
  - { from: secrets-manager, to: lambda    }    # Lambda reads kubeconfig creds

# ── EKS Cluster ──────────────────────────────────────────────────────────────
# Kubernetes API Server, Worker Nodes, and Pods are all provisioned by EKS below.
environments:
  dev:
    multi_az: false
    eks:
      node_count: 1
      instance_type: t3.xlarge
    lambda:
      memory_mb: 256
      timeout_s: 60

  uat:
    multi_az: true
    eks:
      node_count: 2
      instance_type: t3.xlarge
    lambda:
      memory_mb: 512
      timeout_s: 60

  prod:
    multi_az: true
    eks:
      node_count: 3
      instance_type: t3.xlarge
    lambda:
      memory_mb: 1024
      timeout_s: 60

# ── CI/CD ────────────────────────────────────────────────────────────────────
cicd:
  auto_deploy:
    - dev

# ── Flows ────────────────────────────────────────────────────────────────────
flows:
  deployment_flow:
    description: "ECR image push → EventBridge → Lambda → EKS Kubernetes API → Rolling update → Pods"
    services: [ecr, eventbridge, lambda, eks]

  notification_flow:
    description: "EventBridge/Lambda → SQS + SNS → External monitoring tool polls SNS"
    services: [eventbridge, sqs, sns, lambda]

  observability_flow:
    description: "Lambda + EKS metrics/logs → CloudWatch alarms"
    services: [lambda, eks, cloudwatch]
