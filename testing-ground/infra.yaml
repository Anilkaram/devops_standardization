# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# infra.yaml — Classic 3-Tier AWS Architecture
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# ARCHITECTURE OVERVIEW
#   Internet → ALB (Public/DMZ subnet, spans AZ1 + AZ2)
#            → Auto Scaling Group of EC2 Web App Servers (Private/APP subnet)
#            → RDS Multi-AZ Primary + Standby (Private/RES subnet)
#
# SUBNET TIERS (inside VPC, across 2 Availability Zones)
#   Public/DMZ   — Application Load Balancer
#   Private/APP  — Web App Servers (EC2 in Auto Scaling Group)
#   Private/RES  — Amazon RDS (Primary AZ1, Standby AZ2, Sync Replication)
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

project:
  name: three-tier-app
  region: us-east-1
  owner: platform-team
  type: web-application         # classic web app — ALB + EC2 + RDS

stage: growth                   # multi-AZ + auto scaling → beyond prototype

team:
  size: small
  ops_maturity: medium

runtime:
  language: node                # adjust to your web app language (node/python/java/go)
  containerised: false          # diagram shows EC2 instances, not containers

# ── Services ─────────────────────────────────────────────────────────────────
# `type` = catalog keyword (what the tool uses to find the template)
# `name` = instance identifier (used in resource names + connections)
services:

  # -- networking --
  - type: vpc
    name: main-vpc
    cidr: 10.0.0.0/16
    availability_zones: 2       # AZ1 + AZ2 as shown in diagram
    subnets:
      public_dmz:               # Public/DMZ — ALB lives here
        az1: 10.0.0.0/24
        az2: 10.0.1.0/24
      private_app:              # Private/APP — Web App Servers live here
        az1: 10.0.2.0/24
        az2: 10.0.3.0/24
      private_res:              # Private/RES — RDS Primary + Standby live here
        az1: 10.0.4.0/24
        az2: 10.0.5.0/24

  # -- load balancer (Public/DMZ subnet) --
  - type: alb
    name: app-load-balancer
    subnet_tier: public_dmz     # deployed in public/DMZ subnets across both AZs
    internet_facing: true
    listener:
      port: 443
      protocol: HTTPS
    target_group:
      port: 80
      protocol: HTTP
      health_check_path: /health

  # -- compute (Private/APP subnet) --
  - type: autoscaling
    name: web-app-asg
    subnet_tier: private_app    # instances launched in private/APP subnets
    launch_template: web-app-server

  - type: ec2
    name: web-app-server        # Web App Server — managed by web-app-asg
    subnet_tier: private_app
    associate_public_ip: false  # private subnet — no direct internet access

  # -- database (Private/RES subnet) --
  - type: rds
    name: app-database
    subnet_tier: private_res    # deployed in private/RES subnets
    engine: mysql               # adjust to your DB engine (mysql/postgres/etc.)
    multi_az: true              # Primary AZ1 + Standby AZ2, sync replication as shown
    storage_encrypted: true

  # -- security --
  - type: kms
    name: app-kms-key           # encrypts RDS storage + any future secrets

  - type: secrets-manager
    name: db-credentials        # RDS username/password — fetched by web-app-server at runtime

  # -- observability --
  - type: cloudwatch
    name: app-observability     # metrics + alarms for ALB, ASG, EC2, RDS

# ── Auth ─────────────────────────────────────────────────────────────────────
auth:
  required: false               # no auth layer shown in diagram; add cognito/waf if needed
  method: iam                   # EC2 instance role → RDS + Secrets Manager access

# ── Connections ──────────────────────────────────────────────────────────────
connections:
  # internet → ALB → EC2 (via Auto Scaling Group)
  - { from: app-load-balancer, to: web-app-asg }      # ALB routes to ASG target group
  - { from: web-app-asg,       to: web-app-server }   # ASG manages EC2 instances

  # EC2 → RDS
  - { from: web-app-server,    to: app-database }      # app reads/writes to RDS primary

  # EC2 → Secrets Manager (fetch DB credentials at startup)
  - { from: web-app-server,    to: db-credentials }

  # KMS encrypts RDS + Secrets Manager
  - { from: app-kms-key,       to: app-database }
  - { from: app-kms-key,       to: db-credentials }

  # observability
  - { from: app-observability, to: app-load-balancer }
  - { from: app-observability, to: web-app-server }
  - { from: app-observability, to: app-database }
  - { from: app-observability, to: web-app-asg }

# ── Environments ─────────────────────────────────────────────────────────────
environments:
  dev:
    multi_az: false             # single AZ for dev — cost saving
    autoscaling:
      web-app-asg:
        min_size: 1
        max_size: 2
        desired_capacity: 1
    ec2:
      web-app-server:
        instance_type: t3.small
    rds:
      app-database:
        instance_class: db.t3.medium
        multi_az: false

  prod:
    multi_az: true              # matches diagram — AZ1 primary, AZ2 standby
    autoscaling:
      web-app-asg:
        min_size: 2             # one instance per AZ at minimum
        max_size: 6
        desired_capacity: 2
        scale_out_cpu_threshold: 70
        scale_in_cpu_threshold: 30
    ec2:
      web-app-server:
        instance_type: t3.medium
    rds:
      app-database:
        instance_class: db.r5.large
        multi_az: true          # sync replication to standby in AZ2 as shown

# ── CI/CD ────────────────────────────────────────────────────────────────────
cicd:
  auto_deploy:
    - dev
  manual_deploy:
    - prod