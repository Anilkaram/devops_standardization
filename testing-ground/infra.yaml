project:
  name: protecto-platform
  region: us-east-1
  owner: platform-team
  type: web-api-container-platform

stage: production

team:
  size: medium
  ops_maturity: high

runtime:
  language: python
  containerised: true

# ── Services ─────────────────────────────────────────────────────────────────
# Direct mapping of all infrastructure components from the architecture diagram.
services:
  # Edge & Content Delivery
  - cloudfront            # CDN distributing static assets from S3 to end users via AWS WAF
  - s3                    # Static file hosting (HTML, CSS, JS) behind CloudFront

  # Security
  - waf                   # AWS WAF inspects all incoming traffic from client devices

  # API Entry Point
  - api-gateway           # Receives API calls from WAF; routes to Lambda for processing

  # Compute (Lambda in public subnet, EKS in private subnet)
  - lambda                # Processes API requests; orchestrates EKS workload operations
  - eks                   # Managed Kubernetes cluster hosting containerised application pods

  # Container Registry (private subnet)
  - ecr                   # Stores container images; EKS pulls images on deployment

  # Security & Key Management
  - kms                   # Encrypts S3 objects, EKS secrets, and ECR images at rest
  - secrets-manager       # Stores EKS credentials and service account tokens securely

  # Monitoring & Observability
  - cloudwatch            # Collects logs and metrics from Lambda, EKS nodes, and API Gateway

# ── Auth ─────────────────────────────────────────────────────────────────────
auth:
  required: true
  method: iam             # IAM roles for Lambda execution, ECR pull, and EKS node permissions

# ── Connections ──────────────────────────────────────────────────────────────
connections:
  # Edge Traffic Flow
  - { from: cloudfront,     to: s3            }  # CloudFront fetches static files from S3 origin
  - { from: api-gateway,    to: lambda        }  # API Gateway invokes Lambda for all API calls

  # Compute → Container Platform
  - { from: lambda,         to: eks           }  # Lambda triggers workload operations on EKS
  - { from: ecr,            to: eks           }  # EKS pulls container images from ECR on deploy

  # Security Integration
  - { from: kms,            to: s3            }  # KMS-SSE encrypts all S3 static file objects
  - { from: kms,            to: eks           }  # KMS encrypts Kubernetes secrets at rest
  - { from: secrets-manager, to: lambda       }  # Lambda fetches EKS credentials from Secrets Manager

  # Observability
  - { from: lambda,         to: cloudwatch    }  # Lambda execution logs and error metrics
  - { from: eks,            to: cloudwatch    }  # EKS Container Insights — node and pod metrics
  - { from: api-gateway,    to: cloudwatch    }  # API Gateway access logs and latency metrics

# ── Flows ────────────────────────────────────────────────────────────────────
flows:
  user_request_flow:
    description: "End-user access journey: Client devices hit AWS WAF which inspects and filters traffic. Static asset requests are served via CloudFront from an S3 bucket. Dynamic API calls pass through API Gateway, invoke Lambda in the public subnet, which in turn communicates with the EKS cluster in the private subnet to process and return results."
    services: [cloudfront, s3, api-gateway, lambda, eks]

  container_deployment_flow:
    description: "Container image delivery: New images are pushed to ECR. The EKS cluster pulls updated images directly from ECR within the private subnet via the Image Pull path. IAM roles control pull permissions and KMS encrypts image layers at rest."
    services: [ecr, eks, kms]

  observability_flow:
    description: "Platform monitoring: Lambda, EKS nodes/pods, and API Gateway all emit logs and metrics to CloudWatch. Alarms can be configured on Lambda error rates, EKS CPU/memory, and API Gateway 5xx counts."
    services: [lambda, eks, api-gateway, cloudwatch]

# ── Environments ─────────────────────────────────────────────────────────────
environments:
  dev:
    multi_az: false
    eks:
      node_count: 1
      instance_type: t3.large
    lambda:
      memory_mb: 256
      timeout_s: 30

  uat:
    multi_az: true
    eks:
      node_count: 2
      instance_type: t3.xlarge
    lambda:
      memory_mb: 512
      timeout_s: 30

  prod:
    multi_az: true
    eks:
      node_count: 3
      instance_type: t3.2xlarge
    lambda:
      memory_mb: 1024
      timeout_s: 30

# ── CI/CD ────────────────────────────────────────────────────────────────────
cicd:
  auto_deploy:
    - dev
  manual_deploy:
    - uat
    - prod